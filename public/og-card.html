<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #0b0f0c;
    background-image:
      radial-gradient(900px 500px at 85% -10%, #12321088, transparent),
      radial-gradient(700px 500px at 0% 110%, #0c1c2e66, transparent);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e8f0e6;
    padding: 66px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top { display: flex; align-items: center; gap: 14px; }
  .frog { font-size: 44px; }
  .brand { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; display: inline-flex; align-items: center; gap: 12px; }
  .brand .a { color: #5fbf4f; }
  .brand .wpp { font-family: ui-monospace, Menlo, monospace; font-size: 18px; font-weight: 700; letter-spacing: 0.1em; color: #7fe06a; border: 1px solid #2f7a2a; background: #2f7a2a33; padding: 4px 10px; border-radius: 8px; }
  h1 { font-size: 74px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.02; max-width: 760px; }
  .sub { font-size: 27px; color: #9db09a; margin-top: 22px; max-width: 720px; line-height: 1.35; }
  .btc { color: #f7931a; } .eth { color: #7b8cff; }
  .cards { position: absolute; right: 56px; top: 150px; display: flex; gap: 18px; }
  .cards img { width: 190px; height: 258px; object-fit: cover; border-radius: 14px; border: 1px solid #ffffff22; box-shadow: 0 18px 50px #000a; }
  .cards img:nth-child(2) { margin-top: 42px; }
  .foot { display: flex; align-items: center; gap: 26px; font-size: 22px; }
  .pill { display: inline-flex; align-items: center; gap: 9px; padding: 9px 18px; border-radius: 999px; border: 1px solid #273327; font-weight: 600; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.n { background: #f7931a; } .dot.w { background: #7b8cff; }
</style>
</head>
<body>
  <div class="top">
    <svg width="46" height="46" viewBox="0 0 100 100" aria-hidden="true">
      <rect width="100" height="100" rx="26" fill="#5fbf4f"/>
      <circle cx="34" cy="42" r="13" fill="#0b0f0c"/>
      <circle cx="66" cy="42" r="13" fill="#0b0f0c"/>
      <circle cx="34" cy="42" r="5" fill="#fff"/>
      <circle cx="66" cy="42" r="5" fill="#fff"/>
      <path d="M28 64 Q50 80 72 64" stroke="#0b0f0c" stroke-width="7" fill="none" stroke-linecap="round"/>
    </svg>
    <span class="brand">Where<span class="a">Pepe</span> Prices <span class="wpp">WPP</span></span>
  </div>

  <div>
    <h1>Where's each Rare<br/>Pepe cheapest?</h1>
    <div class="sub">
      Floor price <span class="btc">native on Counterparty</span> vs
      <span class="eth">wrapped in Emblem</span> — in ETH, all 1,774 cards.
    </div>
  </div>

  <div class="foot">
    <span class="pill"><span class="dot n"></span>Native · Bitcoin</span>
    <span class="pill"><span class="dot w"></span>Wrapped · Ethereum</span>
  </div>

  <div class="cards">
    <img src="https://pepewtf.s3.amazonaws.com/collections/rare-pepes/small/1/RAREPEPE.jpg" />
    <img src="https://pepewtf.s3.amazonaws.com/collections/rare-pepes/small/1/DANKPEPE.jpg" />
  </div>
</body>
</html>
